name: vacuum-arc-matrix

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / SuperLU-${{ matrix.superlu }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        superlu: [ON, OFF]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update ; sudo apt-get install -y ninja-build

      - name: Install SuperLU (Linux)
        if: runner.os == 'Linux' && matrix.superlu == 'ON'
        run: sudo apt-get update ; sudo apt-get install -y libsuperlu-dev

      - name: Setup vcpkg (Windows SuperLU ON)
        if: runner.os == 'Windows' && matrix.superlu == 'ON'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP/vcpkg"
          & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"
          & "$env:RUNNER_TEMP/vcpkg/vcpkg.exe" install superlu:x64-windows
          "VCPKG_ROOT=$env:RUNNER_TEMP/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_SUPERLU=${{ matrix.superlu }}

      - name: Configure (Windows, SuperLU ON)
        if: runner.os == 'Windows' && matrix.superlu == 'ON'
        shell: pwsh
        run: |
          cmake -S . -B build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_SUPERLU=ON -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure (Windows, SuperLU OFF)
        if: runner.os == 'Windows' && matrix.superlu == 'OFF'
        shell: pwsh
        run: |
          cmake -S . -B build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_SUPERLU=OFF

      - name: Build
        run: |
          cmake --build build-ci --target \
            VacuumArc_smoke_test \
            VacuumArc_presets_smoke_test \
            Radiation_smoke_test \
            Radiation_presets_smoke_test \
            InternalCharging_smoke_test \
            InternalCharging_radiation_coupling_smoke_test \
            SCDAT

      - name: Test toolkit gates
        run: |
          ctest --test-dir build-ci \
            -R "VacuumArc|Preset|ArcPic|CaseMatrix|CompareSelf|Radiation|InternalCharging|InternalRadiationCoupling|InternalRadiationComponent" \
            --output-on-failure

      - name: Upload Vacuum Arc Gate Summary (SuperLU OFF)
        if: matrix.superlu == 'OFF'
        uses: actions/upload-artifact@v4
        with:
          name: vacuum-arc-gate-${{ runner.os }}-superlu-${{ matrix.superlu }}
          path: |
            build-ci/arc_compare_matrix_gate.json
            build-ci/arc_compare_matrix_gate.md
            build-ci/arc_compare_matrix_gate/**

  cross-platform-consistency:
    name: Vacuum Arc Cross-Platform Consistency
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux summary artifact
        uses: actions/download-artifact@v4
        with:
          name: vacuum-arc-gate-Linux-superlu-OFF
          path: artifacts/linux

      - name: Download Windows summary artifact
        uses: actions/download-artifact@v4
        with:
          name: vacuum-arc-gate-Windows-superlu-OFF
          path: artifacts/windows

      - name: Run cross-platform consistency gate
        run: |
          python scripts/python/check_vacuum_arc_cross_platform_consistency_gate.py \
            --platform-a-label windows \
            --platform-b-label linux \
            --platform-a-summary-json artifacts/windows/arc_compare_matrix_gate.json \
            --platform-b-summary-json artifacts/linux/arc_compare_matrix_gate.json \
            --max-rel-rmse-delta 1e-3 \
            --max-rel-peak-delta-delta 1e-3 \
            --max-rel-final-delta-delta 1e-3 \
            --max-rel-integral-delta-delta 1e-3 \
            --max-rel-steady-mean-delta-delta 1e-3 \
            --max-breakdown-time-delta-delta-s 1e-8 \
            --report-json artifacts/cross/vacuum_arc_cross_platform_consistency.json \
            --report-md artifacts/cross/vacuum_arc_cross_platform_consistency.md

      - name: Upload cross-platform consistency report
        uses: actions/upload-artifact@v4
        with:
          name: vacuum-arc-cross-platform-consistency
          path: |
            artifacts/cross/vacuum_arc_cross_platform_consistency.json
            artifacts/cross/vacuum_arc_cross_platform_consistency.md
